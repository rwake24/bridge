name: Publish to npm

on:
  release:
    types: [published]
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  # Publish to `latest` tag on GitHub Release
  publish:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Publish
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ""

  # Publish to `dev` tag on every push to main
  publish-dev:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Set dev version
        run: |
          BASE=$(node -p "require('./package.json').version")
          npm version "${BASE}-dev.${GITHUB_RUN_NUMBER}" --no-git-tag-version

      - name: Publish dev tag
        run: npm publish --tag dev --provenance
        env:
          NODE_AUTH_TOKEN: ""
